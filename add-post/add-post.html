<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (!localStorage.getItem("isLoggedIn")){
            alert("You must be logged in to access Add Post!");
            window.location.href = "login.html"
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TheDailySpark✨</h1>
        <nav>
            <a href="../Index.html">Home</a>
        </nav>
    </header>

    <main>
        <section class="add-post-container">
            <h2>Add New Post</h2>
            <form id="postForm">
                <label>Post Title</label>
                <input type="text" id="postTitle" placeholder="Enter post title" required>

                <label>Thumbnil Image URL</label>
                <input type="text" id="postImage" placeholder="Enter image link">

                <label>Short Description</label>
                <textarea id="postDescription" rows="3" placeholder="Short summary..." required></textarea>

                <label>Post Content</label>
                <textarea id="postContent" rows="8" placeholder="Write something..." required></textarea>

                <button type="submit" id="publishBtn">Publish Post</button>

            </form>
            <div>
                <a href="../Index.html" class="back-btn">⬅ Back to Home</a>
            </div>
        </section>
    </main>

    <script src="add.js"></script>
</body>
</html>
